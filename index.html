<!DOCTYPE html>
<html lang="dv" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ނަކަތް އިރުވަރު • ނަކަތް ސޯލާ އިންޖީނު</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        @font-face {
            font-family: 'Faagathi Dheli';
            src: url('./FaagathiDheli-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Faagathi Dheli';
            src: url('./FaagathiDheli-Light.woff2') format('woff2');
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }

        html {
            font-size: 48px;
            -webkit-tap-highlight-color: transparent;
            height: 100%;
        }

        body { 
            font-family: 'Faagathi Dheli', 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
        }
        
        /* Enforce structured direction layout metrics purely on Latin metrics */
        .numeric-data { 
            font-family: 'Inter', sans-serif; 
            direction: ltr; 
            text-align: left; 
        }
        /* Hide default native scrollbars across submenus */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body id="app-body" class="bg-[#090d16] text-slate-200 flex flex-col justify-between overflow-hidden transition-colors duration-1000 select-none">

    <!-- Top Native-Style Navigation Bar Container -->
    <header class="w-full bg-slate-950/40 border-b border-slate-900/60 backdrop-blur-xl px-2 pt-2 pb-0 flex justify-between items-center z-40 shrink-0">
        <div class="space-y-0.1">
            <h1 class="text-xl font-normal text-emerald-400 tracking-wide">ނަކަތް އިރުވަރު</h1>
            <p class="text-sm text-slate-200 font-light">އިރުގެ މަގާމުން މޫސުން ބަލާ ކަލަންޑަރު</p>
        </div>
        <div class="flex items-center gap-2">
            <button id="reset-to-now" class="hidden text-sm bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full transition-all active:scale-95 cursor-pointer">
                ⌂ މިހާރު
            </button>
            <span id="monsoon-badge" class="px-1 py-1 rounded-sm text-sm font-medium tracking-wide transition-all duration-1000 shadow-sm">
                ...
            </span>
        </div>
    </header>

    <!-- Dynamic Central Frame Component Viewport -->
    <main class="flex-1 w-full max-w-xl mx-auto overflow-y-auto no-scrollbar p-2 space-y-2">
        
        <!-- Viewport A: Dashboard Panel Grid Content wrapper -->
        <div id="view-dashboard" class="space-y-5 block animate-fade-in">
            
            <!-- Hero Information Identity Viewport Card Component -->
            <div class="bg-gradient-to-b from-slate-900/50 to-slate-900/20 border border-slate-900 rounded-sm p-1 space-y-0 shadow-xl backdrop-blur-md mb-1">
                <div class="flex justify-between items-center">
                    <div class="space-y-1">
                        <span id="view-mode-indicator" class="text-sm font-bold tracking-widest text-slate-400 uppercase">މިހާރުގެ މަގާމު</span>
                        <div id="nakaiy-name" class="text-xl font-normal text-white py-1">--</div>
                    </div>
                    <span id="card-monsoon-badge" class="text-sm font-medium uppercase tracking-wider px-2 py-0 rounded-sm bg-slate-950/80 text-slate-400 border border-slate-900/80">--</span>
                </div>

                <!-- Text Description Container Segment block -->
                <div class="space-y-1">
                    <p id="nakaiy-desc" class="text-lg font-light text-slate-300 leading-tight text-justify bg-slate-700/20 p-0.5 rounded-sm border border-slate-950">
                        ލޯޑުވަނީ...
                    </p>
                </div>

                <!-- Custom Minimal Progress Bar Widget Track -->
                <div id="progress-container" class="space-y-0">
                    <div class="flex justify-between text-sm font-medium text-slate-400">
                        <span>ނަކަތް ހިނގަމުންދާ މިންވަރު</span>
                        <span id="progress-text" class="numeric-data font-semibold text-[20px] pt-1">0%</span>
                    </div>
                    <div class="w-full bg-slate-950 h-2 rounded-full overflow-hidden p-0.5 border border-slate-900">
                        <div id="progress-bar" class="h-full bg-emerald-500 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Live Transition Counter Metric Block Layout -->
                <div class="pt-1 border-t border-slate-900/80 flex flex-col gap-0.5">
                    <span id="time-meta-label" class="text-sm font-medium text-slate-400">ދެން ނަކަތް ބަދަލުވާނީ:</span>
                    <div id="countdown-text" class="text-sm font-medium text-emerald-400">ހިސާބުކުރަނީ...</div>
                </div>
            </div>

            <!-- Ephemeris Logging Metrics Container Widget layout -->
            <div class="bg-slate-950/40 border border-slate-900 rounded-sm p-2 grid grid-cols-2 gap-0">
                <div class="space-y-1">
                    <p id="longitude-label" class="text-slate-500 text-xs uppercase font-medium">އިރުގެ މަގާމު</p>
                    <p id="raw-longitude" class="font-semibold text-slate-300 numeric-data text-[18px]">0.0000°</p>
                </div>
                <div class="space-y-1">
                    <p class="text-slate-500 text-xs uppercase font-medium">ބައިނަލްއަޤްވާމީ ގަޑި</p>
                    <p id="utc-clock" class="text-slate-300 numeric-data text-[18px]">--:--:--</p>
                </div>
            </div>
        </div>

        <!-- Viewport B: Interactive Timeline Exploration View panel container layout -->
        <div id="view-timeline" class="hidden space-y-3 pb-6 animate-fade-in">
            <div id="timeline-container" class="space-y-2.5">
                <!-- Programmatically rendered lists mapped straight into active DOM view structure -->
            </div>
        </div>
    </main>

    <!-- Persistent Floating App Navigation Menu Footer Track -->
    <nav class="w-full bg-slate-950/80 border-t border-slate-900/60 backdrop-blur-2xl flex justify-around items-center py-2 px-6 pb-5 shrink-0 z-40">
        <button id="tab-btn-dash" type="button" class="flex flex-col items-center justify-center text-emerald-400 transition-all duration-300 scale-100 active:scale-95 w-1/2 py-1 cursor-pointer">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
            <span class="text-sm font-medium tracking-wide">މިހާރު</span>
        </button>
        <button id="tab-btn-time" type="button" class="flex flex-col items-center justify-center text-slate-500 transition-all duration-300 scale-100 active:scale-95 w-1/2 py-1 cursor-pointer">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
            <span class="text-sm font-medium tracking-wide">ހުރިހާ ނަކަތްތައް</span>
        </button>
    </nav>

    <!-- JavaScript Execution Engine Context -->
    <script>
        const DEGREES_PER_NAKAIY = 360 / 27; 
        const ASSIDHA_START_LONGITUDE = 18.0;

        let NAKAIY_LIST = []; 

        let appState = {
            isTrackingLive: true,
            selectedNakaiyIndex: 0,
            liveCurrentIndex: -1, 
            hasInitialScrollFocused: false,
            currentActiveTab: 'dashboard'
        };

        async function initializeEngine() {
            try {
                const response = await fetch('./nakaiy-data.json');
                if (!response.ok) throw new Error('Data endpoint load fault.');
                NAKAIY_LIST = await response.json();
                
                calculateInitialIndices();
                buildTimelineUI(appState.liveCurrentIndex);
                updateDisplay();
                setupMobileNavHandlers();
                
                setInterval(updateDisplay, 1000);
            } catch (error) {
                console.error(error);
                document.getElementById("nakaiy-desc").innerText = "މައްސަލައެއް ދިމާވެއްޖެ: ނަކަތްތަކުގެ ތަފްޞީލު ފައިލް ލޯޑެއް ނުކުރެވުނު.";
            }
        }

        function getSunEclipticLongitude(date) {
            const timeMs = date.getTime();
            const j2000 = 946728000000;
            const D = (timeMs - j2000) / 86400000;

            let q = (280.459 + 0.98564736 * D) % 360;
            let g = (357.529 + 0.98560028 * D) % 360;
            
            if (q < 0) q += 360;
            if (g < 0) g += 360;

            const gRad = g * Math.PI / 180;
            let lambda = q + 1.915 * Math.sin(gRad) + 0.020 * Math.sin(2 * gRad);
            lambda = lambda % 360;
            if (lambda < 0) lambda += 360;

            return lambda;
        }

        function handleNakaiyClick(clickedIndex) {
            if (clickedIndex === appState.liveCurrentIndex) {
                resetToLiveTracking();
                return;
            }

            appState.isTrackingLive = false;
            appState.selectedNakaiyIndex = clickedIndex;
            document.getElementById("reset-to-now").classList.remove("hidden");
            
            buildTimelineUI(clickedIndex);
            updateDisplay();
            switchMobileTab('dashboard');
        }

        function resetToLiveTracking() {
            appState.isTrackingLive = true;
            appState.selectedNakaiyIndex = appState.liveCurrentIndex;
            document.getElementById("reset-to-now").classList.add("hidden");
            
            buildTimelineUI(appState.liveCurrentIndex);
            updateDisplay();
        }

        function buildTimelineUI(activeIndex) {
            const container = document.getElementById("timeline-container");
            container.innerHTML = ""; 

            NAKAIY_LIST.forEach((nakaiy, index) => {
                const isSelected = index === activeIndex;
                const isActualLiveNow = index === appState.liveCurrentIndex;
                
                const row = document.createElement("button");
                row.type = "button";
                row.onclick = () => handleNakaiyClick(index);
                
                row.className = `w-full text-right flex justify-between items-center p-4 rounded-2xl border transition-all duration-200 cursor-pointer ${
                    isSelected 
                    ? "bg-emerald-500/10 border-emerald-500/40 text-emerald-300 font-medium shadow-md" 
                    : "bg-slate-900/30 border-slate-900/40 text-slate-400 active:bg-slate-900/60"
                }`;
                
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="w-2 h-2 rounded-full ${isActualLiveNow ? 'bg-emerald-400 animate-pulse' : 'bg-transparent'}"></span>
                        <span class="${isSelected ? 'text-white text-base' : 'text-sm'}">${nakaiy.name}</span>
                        ${isActualLiveNow ? '<span class="text-[9px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full mr-2 font-medium">މިހާރު</span>' : ''}
                    </div>
                    <span class="text-sm tracking-wide px-2.5 py-0.5 rounded-full bg-slate-950/40 ${nakaiy.monsoon === 'އިރުވައި' ? 'text-amber-500/60 border border-amber-500/10' : 'text-sky-500/60 border border-sky-500/10'}">${nakaiy.monsoon}</span>
                `;
                container.appendChild(row);
            });
        }

        function updateDisplay() {
            if (NAKAIY_LIST.length === 0) return; 

            const now = new Date();
            const lon = getSunEclipticLongitude(now);
            
            let shiftedLon = lon - ASSIDHA_START_LONGITUDE;
            if (shiftedLon < 0) shiftedLon += 360;
            
            const exactLiveIndex = Math.floor(shiftedLon / DEGREES_PER_NAKAIY);
            
            if (exactLiveIndex !== appState.liveCurrentIndex) {
                appState.liveCurrentIndex = exactLiveIndex;
                if (appState.isTrackingLive) {
                    appState.selectedNakaiyIndex = exactLiveIndex;
                    buildTimelineUI(exactLiveIndex);
                }
            }

            const targetIndex = appState.isTrackingLive ? exactLiveIndex : appState.selectedNakaiyIndex;
            const displayedNakaiy = NAKAIY_LIST[targetIndex];
            const liveNakaiy = NAKAIY_LIST[exactLiveIndex];

            const badge = document.getElementById("monsoon-badge");
            const body = document.getElementById("app-body");

            if (liveNakaiy.monsoon === "އިރުވައި") {
                body.className = "bg-[#0b0a07] text-stone-200 flex flex-col justify-between overflow-hidden transition-colors duration-1000 select-none h-full";
                badge.className = "px-1 py-1 rounded-sm text-sm font-medium bg-amber-500/10 text-amber-400 border border-amber-500/20 invisible";
                badge.innerText = "އިރުވައި";
            } else {
                body.className = "bg-[#06080f] text-slate-200 flex flex-col justify-between overflow-hidden transition-colors duration-1000 select-none h-full";
                badge.className = "px-1 py-0 rounded-sm text-sm font-medium bg-sky-500/10 text-sky-400 border border-sky-500/20 invisible";
                badge.innerText = "ހުޅަނގު";
            }

            document.getElementById("nakaiy-name").innerText = displayedNakaiy.name;
            document.getElementById("nakaiy-desc").innerText = displayedNakaiy.desc;
            document.getElementById("card-monsoon-badge").innerText = displayedNakaiy.monsoon;
            document.getElementById("utc-clock").innerText = now.toUTCString().replace("GMT", "UTC").slice(17, 25);

            const viewModeIndicator = document.getElementById("view-mode-indicator");
            const progressContainer = document.getElementById("progress-container");
            const countdownText = document.getElementById("countdown-text");
            const timeMetaLabel = document.getElementById("time-meta-label");
            const longLabel = document.getElementById("longitude-label");
            const rawLongVal = document.getElementById("raw-longitude");

            if (appState.isTrackingLive) {
                viewModeIndicator.innerText = "މިހާރުގެ ފަލަކީ މަގާމު";
                viewModeIndicator.className = "text-xs tracking-widest text-emerald-400";
                progressContainer.classList.remove("hidden");
                timeMetaLabel.innerText = "ދެން ނަކަތް ބަދަލުވާނީ:";
                longLabel.innerText = "އިރުގެ މަގާމު";
                rawLongVal.innerText = `${lon.toFixed(4)}°`;

                const progressFraction = (shiftedLon % DEGREES_PER_NAKAIY) / DEGREES_PER_NAKAIY;
                document.getElementById("progress-text").innerText = `${(progressFraction * 100).toFixed(2)}%`;
                
                const fillBar = document.getElementById("progress-bar");
                fillBar.style.width = `${progressFraction * 100}%`;
                fillBar.className = displayedNakaiy.monsoon === "އިރުވައި" ? "h-full bg-amber-500 rounded-full" : "h-full bg-sky-500/40 rounded-full";

                const degreesRemaining = DEGREES_PER_NAKAIY - (shiftedLon % DEGREES_PER_NAKAIY);
                const approximateMsRemaining = degreesRemaining * (365.2422 / 360) * 24 * 60 * 60 * 1000;
                
                const seconds = Math.floor((approximateMsRemaining / 1000) % 60);
                const minutes = Math.floor((approximateMsRemaining / (1000 * 60)) % 60);
                const hours = Math.floor((approximateMsRemaining / (1000 * 60 * 60)) % 24);
                const days = Math.floor(approximateMsRemaining / (1000 * 60 * 60 * 24));
                
                const nextIndex = (exactLiveIndex + 1) % 27;
                countdownText.innerHTML = `<span class="numeric-data text-[18px]">${days}d ${hours}h ${minutes}m ${seconds}s</span> <span class="text-sm text-slate-400">ކުރިއަށް އޮތީ ${NAKAIY_LIST[nextIndex].name}</span>`;
                countdownText.className = displayedNakaiy.monsoon === "އިރުވައި" ? "text-sm font-medium text-amber-400" : "text-sm font-medium text-sky-400/40";
            } else {
                viewModeIndicator.innerText = "ތާރީޚީ އަރުޝީފު ބެލުން";
                viewModeIndicator.className = "text-xs tracking-widest text-emerald-400";
                progressContainer.classList.add("hidden");
                timeMetaLabel.innerText = "ނަކަތުގެ ބޮޑުމިން:";
                
                const startAngle = (targetIndex * DEGREES_PER_NAKAIY + ASSIDHA_START_LONGITUDE) % 360;
                const endAngle = ((targetIndex + 1) * DEGREES_PER_NAKAIY + ASSIDHA_START_LONGITUDE) % 360;
                
                longLabel.innerText = "އިރު ހުރި މަގާމު (λ)";
                rawLongVal.innerText = `${lon.toFixed(3)}°`;
                
                countdownText.innerText = `${startAngle.toFixed(1)}° އިން ފެށިގެން ${endAngle.toFixed(1)}° އަށެވެ.`;
                countdownText.className = "text-sm font-medium text-slate-400";
            }
        }

        function switchMobileTab(targetTab) {
            appState.currentActiveTab = targetTab;
            const dashEl = document.getElementById("view-dashboard");
            const timeEl = document.getElementById("view-timeline");
            const btnDash = document.getElementById("tab-btn-dash");
            const btnTime = document.getElementById("tab-btn-time");

            if (targetTab === 'dashboard') {
                dashEl.classList.replace("hidden", "block");
                timeEl.classList.replace("block", "hidden");
                btnDash.className = "flex flex-col items-center justify-center text-emerald-400 w-1/2 py-1 cursor-pointer";
                btnTime.className = "flex flex-col items-center justify-center text-slate-500 w-1/2 py-1 cursor-pointer";
            } else {
                dashEl.classList.replace("block", "hidden");
                timeEl.classList.replace("hidden", "block");
                btnDash.className = "flex flex-col items-center justify-center text-slate-500 w-1/2 py-1 cursor-pointer";
                btnTime.className = "flex flex-col items-center justify-center text-emerald-400 w-1/2 py-1 cursor-pointer";
                
                setTimeout(() => {
                    const container = document.getElementById("timeline-container");
                    const activeIndex = appState.isTrackingLive ? appState.liveCurrentIndex : appState.selectedNakaiyIndex;
                    const activeRow = container.children[activeIndex];
                    if (activeRow) activeRow.scrollIntoView({ block: "center", behavior: "smooth" });
                }, 80);
            }
        }

        function setupMobileNavHandlers() {
            document.getElementById("tab-btn-dash").onclick = () => switchMobileTab('dashboard');
            document.getElementById("tab-btn-time").onclick = () => switchMobileTab('timeline');
        }

        function calculateInitialIndices() {
            const initialLon = getSunEclipticLongitude(new Date());
            let initialShifted = initialLon - ASSIDHA_START_LONGITUDE;
            if (initialShifted < 0) initialShifted += 360;
            
            const initialIndex = Math.floor(initialShifted / DEGREES_PER_NAKAIY);
            appState.liveCurrentIndex = initialIndex;
            appState.selectedNakaiyIndex = initialIndex;
        }

        document.getElementById("reset-to-now").onclick = resetToLiveTracking;

        initializeEngine();
    </script>
</body>
</html>
