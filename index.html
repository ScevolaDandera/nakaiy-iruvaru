<!DOCTYPE html>
<html lang="dv" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ނަކަތް އިރުވަރު - އިރުގެ މަޤާމުން މޫސުން ބަލާ ނަކަތު ކަލަންޑަރު</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap');
        
        @font-face {
            font-family: 'Faagathi Dheli';
            src: url('./FaagathiDheli-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Faagathi Dheli';
            src: url('./FaagathiDheli-Light.woff2') format('woff2');
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }

        html {
            font-size: 48px;
            line-height: 1.5;
            /* Prevents blue tap highlights on mobile screens */
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Faagathi Dheli', 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .numeric-data { 
            font-family: 'Inter', monospace; 
            direction: ltr; 
            text-align: left; 
        }

        /* Custom minimal scrollbar styling for mobile panels */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
    </style>
</head>
<body id="app-body" class="bg-[#0f172a] text-slate-200 min-h-screen flex flex-col justify-between overflow-x-hidden safe-bottom pb-16 md:pb-0 transition-colors duration-1000">

    <header class="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-md border-b border-slate-900 px-4 py-3 flex justify-between items-center w-full max-w-5xl mx-auto">
        <div class="space-y-0.5">
  <h1 class="text-7xl font-bold tracking-wider text-white">ނަކަތް އިރުވަރު</h1>
            <p class="text-6xl text-slate-400">އިރުގެ މަގާމުން މޫސުން ބަލާ ނަކަތު ކަލަންޑަރު</p>
        </div>
        <div class="flex items-center gap-2">
            <button id="reset-to-now" class="hidden text-[11px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-2.5 py-1 rounded-md transition-all cursor-pointer">
                ⌂ މިހާރު
            </button>
            <span id="monsoon-badge" class="px-2.5 py-0.5 rounded-full text-[10px] font-bold tracking-wider transition-all duration-1000">
                ...
            </span>
        </div>
    </header>

    <main class="flex-1 w-full max-w-5xl mx-auto p-4 md:grid md:grid-cols-3 md:gap-6 items-start">
        
        <div id="view-dashboard" class="space-y-4 md:col-span-2 block">
            
            <div class="bg-slate-900/30 border border-slate-900 rounded-2xl p-6 space-y-5 backdrop-blur-sm">
                <div class="flex justify-between items-start">
                    <div class="space-y-0.5">
                        <span id="view-mode-indicator" class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">މިހާރުގެ މަގާމު</span>
                        <div id="nakaiy-name" class="text-4xl font-normal tracking-tight text-white py-1">--</div>
                    </div>
                    <span id="card-monsoon-badge" class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-slate-900 text-slate-400 border border-slate-800">--</span>
                </div>

                <div class="space-y-1">
                    <p id="nakaiy-desc" class="text-sm font-light text-slate-300 leading-relaxed bg-slate-950/20 p-4 rounded-xl border border-slate-900">
                        ލޯޑުވަނީ...
                    </p>
                </div>

                <div id="progress-container" class="space-y-1.5">
                    <div class="flex justify-between text-[11px] font-semibold text-slate-400">
                        <span>ނަކަތް ހިނގަމުންދާ މިންވަރު</span>
                        <span id="progress-text" class="numeric-data">0%</span>
                    </div>
                    <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-emerald-500 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                    </div>
                </div>

                <div class="pt-3 border-t border-slate-900/60 flex flex-col gap-1">
                    <span id="time-meta-label" class="text-[11px] text-slate-400">ދެން ނަކަތް ބަދަލުވާނީ:</span>
                    <span id="countdown-text" class="text-sm font-bold text-emerald-400">ހިސާބުކުރަނީ...</span>
                </div>
            </div>

            <div class="bg-slate-950/20 border border-dashed border-slate-900 rounded-xl p-4 grid grid-cols-2 gap-4 text-xs">
                <div>
                    <p id="longitude-label" class="text-slate-500 text-[10px]">އިރުގެ މަގާމު (λ)</p>
                    <p id="raw-longitude" class="font-bold text-slate-400 mt-0.5 numeric-data">0.0000°</p>
                </div>
                <div>
                    <p class="text-slate-500 text-[10px]">ބައިނަލްއަޤްވާމީ ގަޑި (UTC)</p>
                    <p id="utc-clock" class="font-bold text-slate-400 mt-0.5 numeric-data">--:--:--</p>
                </div>
            </div>
        </div>

        <div id="view-timeline" class="hidden md:block md:col-span-1 bg-slate-900/10 md:border md:border-slate-900 rounded-2xl p-4 md:h-[75vh] flex flex-col">
            <h3 class="hidden md:block text-[48px] font-bold tracking-wider text-slate-400 uppercase mb-3 pb-2 border-b border-slate-900">
                27 ނަކަތުގެ ތަރުތީބު
            </h3>
            <div id="timeline-container" class="flex-1 overflow-y-auto space-y-1.5 pr-1 custom-scroll max-h-[70vh] md:max-h-none">
                </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-slate-950/95 border-t border-slate-900 flex justify-around items-center py-2 backdrop-blur-lg">
        <button id="tab-btn-dash" type="button" class="flex flex-col items-center justify-center text-emerald-400 transition-colors w-1/2 py-1 cursor-pointer">
            <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
            <span class="text-[10px]">މިހާރު</span>
        </button>
        <button id="tab-btn-time" type="button" class="flex flex-col items-center justify-center text-slate-500 transition-colors w-1/2 py-1 cursor-pointer">
            <svg class="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            <span class="text-[10px]">ހުރިހާ ނަކަތްތައް</span>
        </button>
    </nav>

    <script>
        const DEGREES_PER_NAKAIY = 360 / 27; 
        const ASSIDHA_START_LONGITUDE = 18.0;

        let NAKAIY_LIST = []; 

        let appState = {
            isTrackingLive: true,
            selectedNakaiyIndex: 0,
            liveCurrentIndex: -1, 
            hasInitialScrollFocused: false,
            currentActiveTab: 'dashboard' // 'dashboard' or 'timeline'
        };

        async function initializeEngine() {
            try {
                const response = await fetch('./nakaiy-data.json');
                if (!response.ok) throw new Error('Network error loading data asset profile.');
                NAKAIY_LIST = await response.json();
                
                calculateInitialIndices();
                buildTimelineUI(appState.liveCurrentIndex);
                updateDisplay();
                setupMobileNavHandlers();
                
                setInterval(updateDisplay, 1000);
            } catch (error) {
                console.error(error);
                document.getElementById("nakaiy-desc").innerText = "މައްސަލައެއް ދިމާވެއްޖެ: ނަކަތްތަކުގެ ތަފްޞީލު ފައިލް ލޯޑެއް ނުކުރެވުނު.";
            }
        }

        function getSunEclipticLongitude(date) {
            const timeMs = date.getTime();
            const j2000 = 946728000000;
            const D = (timeMs - j2000) / 86400000;

            let q = (280.459 + 0.98564736 * D) % 360;
            let g = (357.529 + 0.98560028 * D) % 360;
            
            if (q < 0) q += 360;
            if (g < 0) g += 360;

            const gRad = g * Math.PI / 180;
            let lambda = q + 1.915 * Math.sin(gRad) + 0.020 * Math.sin(2 * gRad);
            lambda = lambda % 360;
            if (lambda < 0) lambda += 360;

            return lambda;
        }

        function handleNakaiyClick(clickedIndex) {
            if (clickedIndex === appState.liveCurrentIndex) {
                resetToLiveTracking();
                return;
            }

            appState.isTrackingLive = false;
            appState.selectedNakaiyIndex = clickedIndex;
            document.getElementById("reset-to-now").classList.remove("hidden");
            
            buildTimelineUI(clickedIndex);
            updateDisplay();

            // Mobile view adjustment: snap view container frame focus back to active presentation template
            if (window.innerWidth < 768) {
                switchMobileTab('dashboard');
            }
        }

        function resetToLiveTracking() {
            appState.isTrackingLive = true;
            appState.selectedNakaiyIndex = appState.liveCurrentIndex;
            document.getElementById("reset-to-now").classList.add("hidden");
            
            buildTimelineUI(appState.liveCurrentIndex);
            updateDisplay();
        }

        function buildTimelineUI(activeIndex) {
            const container = document.getElementById("timeline-container");
            container.innerHTML = ""; 

            NAKAIY_LIST.forEach((nakaiy, index) => {
                const isSelected = index === activeIndex;
                const isActualLiveNow = index === appState.liveCurrentIndex;
                
                const row = document.createElement("button");
                row.type = "button";
                row.onclick = () => handleNakaiyClick(index);
                
                row.className = `w-full text-right flex justify-between items-center text-xs p-3 rounded-xl border transition-all duration-200 cursor-pointer ${
                    isSelected 
                    ? "bg-emerald-500/10 border-emerald-500/40 text-emerald-300 font-bold shadow-sm" 
                    : "bg-slate-900/30 border-slate-900/60 text-slate-400 hover:border-slate-800"
                }`;
                
                row.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full ${isActualLiveNow ? 'bg-emerald-400 animate-pulse' : 'bg-transparent'}"></span>
                        <span class="${isSelected ? 'text-white font-normal text-sm' : ''}">${nakaiy.name}</span>
                        ${isActualLiveNow ? '<span class="text-[9px] bg-emerald-500/20 text-emerald-400 px-1 rounded mr-2">މިހާރު</span>' : ''}
                    </div>
                    <span class="text-[10px] uppercase tracking-wider ${nakaiy.monsoon === 'އިރުވައި' ? 'text-amber-500/60' : 'text-sky-500/60'}">${nakaiy.monsoon}</span>
                `;
                container.appendChild(row);
                
                if (isSelected && !appState.hasInitialScrollFocused) {
                    setTimeout(() => {
                        row.scrollIntoView({ block: "center", behavior: "smooth" });
                        appState.hasInitialScrollFocused = true;
                    }, 300);
                }
            });
        }

        function updateDisplay() {
            if (NAKAIY_LIST.length === 0) return; 

            const now = new Date();
            const lon = getSunEclipticLongitude(now);
            
            let shiftedLon = lon - ASSIDHA_START_LONGITUDE;
            if (shiftedLon < 0) shiftedLon += 360;
            
            const exactLiveIndex = Math.floor(shiftedLon / DEGREES_PER_NAKAIY);
            
            if (exactLiveIndex !== appState.liveCurrentIndex) {
                appState.liveCurrentIndex = exactLiveIndex;
                if (appState.isTrackingLive) {
                    appState.selectedNakaiyIndex = exactLiveIndex;
                    buildTimelineUI(exactLiveIndex);
                }
            }

            const targetIndex = appState.isTrackingLive ? exactLiveIndex : appState.selectedNakaiyIndex;
            const displayedNakaiy = NAKAIY_LIST[targetIndex];
            const liveNakaiy = NAKAIY_LIST[exactLiveIndex];

            const badge = document.getElementById("monsoon-badge");
            const body = document.getElementById("app-body");

            if (liveNakaiy.monsoon === "އިރުވައި") {
                body.className = "bg-[#0f0e0b] text-stone-200 min-h-screen flex flex-col justify-between overflow-x-hidden safe-bottom pb-16 md:pb-0 transition-colors duration-1000";
                badge.className = "px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-amber-500/10 text-amber-400 border border-amber-500/30";
                badge.innerText = "އިރުވައި";
            } else {
                body.className = "bg-[#060910] text-slate-200 min-h-screen flex flex-col justify-between overflow-x-hidden safe-bottom pb-16 md:pb-0 transition-colors duration-1000";
                badge.className = "px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-sky-500/10 text-sky-400 border border-sky-500/30";
                badge.innerText = "ހުޅަނގު";
            }

            document.getElementById("nakaiy-name").innerText = displayedNakaiy.name;
            document.getElementById("nakaiy-desc").innerText = displayedNakaiy.desc;
            document.getElementById("card-monsoon-badge").innerText = displayedNakaiy.monsoon;
            document.getElementById("utc-clock").innerText = now.toUTCString().replace("GMT", "UTC").slice(17, 25) + " UTC";

            const viewModeIndicator = document.getElementById("view-mode-indicator");
            const progressContainer = document.getElementById("progress-container");
            const countdownText = document.getElementById("countdown-text");
            const timeMetaLabel = document.getElementById("time-meta-label");
            const longLabel = document.getElementById("longitude-label");
            const rawLongVal = document.getElementById("raw-longitude");

            if (appState.isTrackingLive) {
                viewModeIndicator.innerText = "މިހާރުގެ ފަލަކީ މަގާމު";
                viewModeIndicator.className = "text-[10px] font-bold tracking-widest text-emerald-400 uppercase";
                progressContainer.classList.remove("hidden");
                timeMetaLabel.innerText = "ދެން ނަކަތް ބަދަލުވާނީ:";
                longLabel.innerText = "އިރުގެ މަގާމު (λ)";
                rawLongVal.innerText = `${lon.toFixed(4)}°`;

                const progressFraction = (shiftedLon % DEGREES_PER_NAKAIY) / DEGREES_PER_NAKAIY;
                document.getElementById("progress-text").innerText = `${(progressFraction * 100).toFixed(2)}%`;
                
                const fillBar = document.getElementById("progress-bar");
                fillBar.style.width = `${progressFraction * 100}%`;
                fillBar.className = displayedNakaiy.monsoon === "އިރުވައި" ? "h-full bg-amber-500 rounded-full" : "h-full bg-sky-500 rounded-full";

                const degreesRemaining = DEGREES_PER_NAKAIY - (shiftedLon % DEGREES_PER_NAKAIY);
                const approximateMsRemaining = degreesRemaining * (365.2422 / 360) * 24 * 60 * 60 * 1000;
                
                const seconds = Math.floor((approximateMsRemaining / 1000) % 60);
                const minutes = Math.floor((approximateMsRemaining / (1000 * 60)) % 60);
                const hours = Math.floor((approximateMsRemaining / (1000 * 60 * 60)) % 24);
                const days = Math.floor(approximateMsRemaining / (1000 * 60 * 60 * 24));
                
                const nextIndex = (exactLiveIndex + 1) % 27;
                countdownText.innerText = `${days}ދުވަސް ${hours}ގަޑިއިރު ${minutes}މިނެޓު ${seconds}ސިކުންތުުން ${NAKAIY_LIST[nextIndex].name} ނަކަތަށް`;
                countdownText.className = displayedNakaiy.monsoon === "އިރުވައި" ? "text-sm font-bold text-amber-400" : "text-sm font-bold text-sky-400";
            } else {
                viewModeIndicator.innerText = "ތާރީޚީ އަރުޝީފު ބެލުން";
                viewModeIndicator.className = "text-[10px] font-bold tracking-widest text-slate-400 uppercase";
                progressContainer.classList.add("hidden");
                timeMetaLabel.innerText = "ނަކަތުގެ ބޮޑުމިން:";
                
                const startAngle = (targetIndex * DEGREES_PER_NAKAIY + ASSIDHA_START_LONGITUDE) % 360;
                const endAngle = ((targetIndex + 1) * DEGREES_PER_NAKAIY + ASSIDHA_START_LONGITUDE) % 360;
                
                longLabel.innerText = "އިރު ހުރި މަގާމު (λ)";
                rawLongVal.innerText = `${lon.toFixed(3)}°`;
                
                countdownText.innerText = `${startAngle.toFixed(1)}° އިން ފެށިގެން ${endAngle.toFixed(1)}° އަށެވެ.`;
                countdownText.className = "text-sm font-medium text-slate-400";
            }
        }

        function switchMobileTab(targetTab) {
            appState.currentActiveTab = targetTab;
            const dashEl = document.getElementById("view-dashboard");
            const timeEl = document.getElementById("view-timeline");
            const btnDash = document.getElementById("tab-btn-dash");
            const btnTime = document.getElementById("tab-btn-time");

            if (targetTab === 'dashboard') {
                dashEl.classList.replace("hidden", "block");
                timeEl.classList.replace("block", "hidden");
                btnDash.className = "flex flex-col items-center justify-center text-emerald-400 w-1/2 py-1";
                btnTime.className = "flex flex-col items-center justify-center text-slate-500 w-1/2 py-1";
            } else {
                dashEl.classList.replace("block", "hidden");
                timeEl.classList.replace("hidden", "block");
                btnDash.className = "flex flex-col items-center justify-center text-slate-500 w-1/2 py-1";
                btnTime.className = "flex flex-col items-center justify-center text-emerald-400 w-1/2 py-1";
                
                // Force timeline view window container to scroll and center on currently selected node
                setTimeout(() => {
                    const container = document.getElementById("timeline-container");
                    const activeIndex = appState.isTrackingLive ? appState.liveCurrentIndex : appState.selectedNakaiyIndex;
                    const activeRow = container.children[activeIndex];
                    if (activeRow) activeRow.scrollIntoView({ block: "center" });
                }, 50);
            }
        }

        function setupMobileNavHandlers() {
            document.getElementById("tab-btn-dash").onclick = () => switchMobileTab('dashboard');
            document.getElementById("tab-btn-time").onclick = () => switchMobileTab('timeline');
        }

        function calculateInitialIndices() {
            const initialLon = getSunEclipticLongitude(new Date());
            let initialShifted = initialLon - ASSIDHA_START_LONGITUDE;
            if (initialShifted < 0) initialShifted += 360;
            
            const initialIndex = Math.floor(initialShifted / DEGREES_PER_NAKAIY);
            appState.liveCurrentIndex = initialIndex;
            appState.selectedNakaiyIndex = initialIndex;
        }

        document.getElementById("reset-to-now").onclick = resetToLiveTracking;

        initializeEngine();
    </script>
</body>
</html>
